<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research — Document AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07090f;
      --surface:     #0e1422;
      --surface2:    #141929;
      --border:      rgba(255,255,255,0.07);
      --border-hi:   rgba(124,58,237,0.4);
      --accent:      #7c3aed;
      --accent-l:    #a78bfa;
      --accent-bg:   rgba(124,58,237,0.12);
      --text:        #e2e8f0;
      --muted:       #64748b;
      --dim:         #94a3b8;
      --green:       #10b981;
      --yellow:      #f59e0b;
      --red:         #ef4444;
      --r:           10px;
      --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      --mono:        'Menlo','Monaco','SF Mono',monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── Header ───────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,9,15,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 13px 28px;
    }
    .logo { font-size: 0.97rem; font-weight: 700; color: var(--accent-l); letter-spacing: -0.02em; }
    .logo em { font-style: normal; color: var(--muted); font-weight: 400; font-size: 0.8rem; margin-left: 6px; }
    .hdr-r { display: flex; gap: 10px; align-items: center; }
    .badge {
      padding: 3px 10px; border-radius: 20px; font-size: 0.71rem; font-weight: 600;
      background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3); color: var(--accent-l);
    }
    a.back { color: var(--muted); font-size: 0.81rem; text-decoration: none; transition: color .15s; }
    a.back:hover { color: var(--dim); }

    /* ─── Main wrapper ──────────────────────────── */
    .main { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ─── Hero (large, before search) ──────────── */
    #hero {
      padding: 76px 0 52px;
      text-align: center;
      transition: padding .3s ease;
    }
    #hero.compact {
      padding: 22px 0 14px;
      text-align: left;
    }

    .eyebrow {
      font-size: 0.73rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent-l); font-weight: 600; margin-bottom: 14px;
    }
    #hero.compact .eyebrow,
    #hero.compact .hero-title,
    #hero.compact .hero-sub   { display: none; }

    .hero-title {
      font-size: 2.7rem; font-weight: 800; letter-spacing: -0.045em; margin-bottom: 12px;
      background: linear-gradient(130deg, #e2e8f0 0%, #a78bfa 65%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub {
      color: var(--muted); font-size: .93rem; max-width: 500px;
      margin: 0 auto 36px;
    }

    /* ─── Search bar ────────────────────────────── */
    .search-wrap {
      width: 100%; max-width: 700px; margin: 0 auto;
      position: relative; transition: max-width .3s ease;
    }
    #hero.compact .search-wrap { max-width: 100%; margin: 0; }

    .search-input {
      width: 100%; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: 12px;
      color: var(--text); font-family: var(--font); font-size: 1.03rem;
      padding: 15px 136px 15px 18px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.13);
    }
    .search-input::placeholder { color: var(--muted); }

    .search-btn {
      position: absolute; right: 7px; top: 7px; bottom: 7px;
      padding: 0 18px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; font-weight: 700; font-size: 0.87rem;
      cursor: pointer; transition: background .2s, transform .1s;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .search-btn:hover { background: #6d28d9; }
    .search-btn:active { transform: scale(.97); }
    .search-btn:disabled { opacity: .55; cursor: not-allowed; }

    /* ─── Method pills ──────────────────────────── */
    .methods {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-top: 13px; justify-content: center;
      max-width: 700px; margin-left: auto; margin-right: auto;
    }
    #hero.compact .methods { justify-content: flex-start; max-width: 100%; margin-left: 0; margin-right: 0; }

    .pill {
      padding: 4px 12px; border-radius: 20px; font-size: 0.76rem; font-weight: 500;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all .15s; position: relative;
    }
    .pill:hover { border-color: var(--accent-l); color: var(--accent-l); }
    .pill.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-l); }

    .tip {
      display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%); background: #1e2237;
      border: 1px solid var(--border); color: var(--dim); font-size: 0.7rem;
      padding: 6px 10px; border-radius: 6px; width: 200px; text-align: center;
      line-height: 1.4; z-index: 50; pointer-events: none; white-space: normal;
    }
    .pill:hover .tip { display: block; }

    /* ─── Status bar ────────────────────────────── */
    #status-bar {
      display: none; align-items: center; gap: 9px;
      font-size: 0.73rem; color: var(--muted); padding: 9px 0 3px;
    }
    #status-bar.show { display: flex; }
    .sdot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

    /* ─── Results grid ──────────────────────────── */
    #results {
      display: none;
      gap: 18px;
      padding-bottom: 70px;
    }
    #results.show {
      display: grid;
      grid-template-columns: 2fr 3fr;
    }
    @media (max-width: 740px) { #results.show { grid-template-columns: 1fr; } }

    .panel-label {
      font-size: 0.71rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 11px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-count {
      font-size: 0.69rem; padding: 2px 7px; border-radius: 9px;
      background: rgba(255,255,255,0.05); color: var(--muted); font-weight: 500;
    }

    /* ─── Source cards ──────────────────────────── */
    .src-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 13px 14px; margin-bottom: 9px;
      transition: border-color .18s;
    }
    .src-card:hover { border-color: var(--border-hi); }

    .card-top { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 7px; }

    .doc-icon {
      width: 30px; height: 30px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .doc-icon.pdf  { background: rgba(239,68,68,.13); }
    .doc-icon.md   { background: rgba(59,130,246,.13); }
    .doc-icon.docx { background: rgba(59,130,246,.13); }
    .doc-icon.txt  { background: rgba(107,114,128,.13); }
    .doc-icon.any  { background: rgba(124,58,237,.13); }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 0.85rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-loc { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    .card-score {
      font-size: 0.72rem; font-family: var(--mono);
      font-weight: 600; flex-shrink: 0;
    }

    .card-preview {
      font-size: 0.8rem; color: var(--dim); line-height: 1.5; margin-bottom: 9px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-actions { display: flex; gap: 7px; align-items: center; }

    .btn-open {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 11px; font-size: 0.75rem; font-weight: 600;
      border-radius: 6px; cursor: pointer; text-decoration: none;
      background: var(--accent-bg); border: 1px solid rgba(124,58,237,.35);
      color: var(--accent-l); transition: background .15s;
    }
    .btn-open:hover { background: rgba(124,58,237,.22); }

    .btn-view {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 11px; font-size: 0.75rem; font-weight: 500;
      border-radius: 6px; cursor: pointer; text-decoration: none;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); transition: border-color .15s, color .15s;
    }
    .btn-view:hover { border-color: var(--dim); color: var(--dim); }

    .open-ok { font-size: 0.7rem; opacity: 0; transition: opacity .3s; }
    .open-ok.show { opacity: 1; }

    /* ─── Skeleton ──────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skel {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface2) 50%, var(--surface) 100%);
      background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: 5px;
    }
    .skel-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 13px 14px; margin-bottom: 9px;
    }
    .skel-row { height: 9px; margin-bottom: 8px; }

    /* ─── AI panel ──────────────────────────────── */
    .ai-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 18px 20px; min-height: 180px;
    }

    .ai-thinking { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.87rem; }
    .dots { display: flex; gap: 4px; }
    .dots span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .18s; }
    .dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes pulse {
      0%,80%,100% { opacity:.25; transform:scale(.75); }
      40%          { opacity:1;   transform:scale(1); }
    }

    .ai-text { font-size: 0.91rem; line-height: 1.78; color: var(--text); }
    .ai-text p { margin-bottom: 10px; }
    .ai-text p:last-child { margin-bottom: 0; }
    .ai-text strong { color: #e2e8f0; }

    .ai-footer {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
    }
    .ai-tag {
      font-size: 0.69rem; font-weight: 600; padding: 2px 8px; border-radius: 4px;
    }
    .ai-tag.t-model  { background:rgba(124,58,237,.12); color:var(--accent-l); border:1px solid rgba(124,58,237,.2); }
    .ai-tag.t-time   { background:rgba(16,185,129,.08);  color:var(--green);    border:1px solid rgba(16,185,129,.2); }
    .ai-tag.t-method { background:rgba(245,158,11,.08);  color:var(--yellow);   border:1px solid rgba(245,158,11,.2); }

    /* ─── Empty / error state ───────────────────── */
    .empty { text-align: center; padding: 30px 16px; color: var(--muted); }
    .empty .ei { font-size: 1.8rem; margin-bottom: 8px; }
    .empty p { font-size: 0.83rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">Document Research <em>AI-powered</em></div>
  <div class="hdr-r">
    <span class="badge" id="model-badge">{{ default_model }}</span>
    <a class="back" href="/">← Main app</a>
  </div>
</header>

<div class="main">

  <!-- ── Hero / search zone ──────────────────────────────── -->
  <div id="hero">
    <div class="eyebrow">Research Mode</div>
    <h1 class="hero-title">Ask your documents</h1>
    <p class="hero-sub">Search your knowledge base and get AI answers with direct source references you can open instantly.</p>

    <form id="search-form" autocomplete="off">
      <div class="search-wrap">
        <input id="q" type="text" class="search-input"
          placeholder="e.g. What are the conditions in article s26?"
          autocorrect="off" spellcheck="false">
        <button type="submit" class="search-btn" id="search-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
        </button>
      </div>
    </form>

    <!-- Method selector -->
    <div class="methods">
      <button class="pill active" data-method="standard">
        AI Search
        <span class="tip">Standard RAG: fast vector search + language model. Best for most questions.</span>
      </button>
      <button class="pill" data-method="multi-query">
        Multi-Query
        <span class="tip">Auto-generates 3 rephrased versions of your question for broader retrieval.</span>
      </button>
      <button class="pill" data-method="decompose">
        Decompose
        <span class="tip">Splits complex questions into sub-questions before searching each separately.</span>
      </button>
      <button class="pill" data-method="hyde">
        HyDE
        <span class="tip">Generates a hypothetical answer first, then finds real matching passages.</span>
      </button>
      <button class="pill" data-method="hybrid">
        Hybrid
        <span class="tip">Combines keyword and semantic search — best for precise terms or names.</span>
      </button>
      <button class="pill" data-method="iterative">
        Iterative
        <span class="tip">Multi-round retrieval that refines results across follow-up searches.</span>
      </button>
    </div>
  </div>

  <!-- ── Status bar ─────────────────────────────────────── -->
  <div id="status-bar">
    <span class="sdot"></span>
    <span id="status-text">Ready</span>
  </div>

  <!-- ── Results grid ──────────────────────────────────── -->
  <div id="results">

    <!-- Sources column -->
    <div>
      <div class="panel-label">
        Sources
        <span class="panel-count" id="src-count">—</span>
      </div>
      <div id="sources-list"></div>
    </div>

    <!-- AI answer column -->
    <div>
      <div class="panel-label">
        AI Answer
        <span class="panel-count" id="ai-meta">—</span>
      </div>
      <div class="ai-box" id="ai-box"></div>
    </div>

  </div><!-- #results -->
</div><!-- .main -->

<script>
  // ── Config injected from server ─────────────────────────────
  const DEFAULT_MODEL = "{{ default_model|e }}";

  // ── State ────────────────────────────────────────────────────
  let activeMethod = 'standard';

  // ── Method pill selection ────────────────────────────────────
  document.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeMethod = btn.dataset.method;
    });
  });

  // ── Helpers ──────────────────────────────────────────────────
  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function docIcon(path) {
    const ext = (path || '').split('.').pop().toLowerCase();
    if (ext === 'pdf')  return { cls: 'pdf',  em: '📕' };
    if (ext === 'md')   return { cls: 'md',   em: '📝' };
    if (ext === 'docx') return { cls: 'docx', em: '📄' };
    if (ext === 'txt')  return { cls: 'txt',  em: '📃' };
    return { cls: 'any', em: '📄' };
  }

  function basename(p) { return (p || '').split('/').pop(); }

  function scoreColor(s) {
    const n = parseFloat(s);
    if (n >= 0.8) return 'var(--green)';
    if (n >= 0.5) return 'var(--yellow)';
    return 'var(--muted)';
  }

  // ── Skeleton loaders ─────────────────────────────────────────
  function skelCards() {
    return [1, 2, 3].map(() => `
      <div class="skel-card">
        <div class="skel skel-row" style="width:62%"></div>
        <div class="skel skel-row" style="width:40%"></div>
        <div class="skel skel-row" style="width:88%"></div>
        <div class="skel skel-row" style="width:70%"></div>
      </div>`).join('');
  }

  function skelAI() {
    return `<div class="ai-thinking">
      <div class="dots"><span></span><span></span><span></span></div>
      <span>AI is thinking…</span>
    </div>`;
  }

  // ── Render source card ────────────────────────────────────────
  function renderCard(r, idx) {
    const { cls, em } = docIcon(r.path || r.document || '');
    const fname  = basename(r.path) || r.document || 'Document';
    const dname  = r.document || fname;
    const page   = r.page   ? `p.${r.page}` : '';
    const sec    = r.section || r.chapter || '';
    const loc    = [page, sec].filter(Boolean).join(' · ');
    const sim    = r.similarity || (r.score != null ? String(r.score).slice(0, 5) : '');
    const prev   = r.preview || r.content || '';
    const path   = r.path || '';
    const pg     = r.page || 0;
    const viewHref = fname ? `/files/serve/${encodeURIComponent(fname)}${pg ? '#page=' + pg : ''}` : '#';

    return `
      <div class="src-card" id="card-${idx}">
        <div class="card-top">
          <div class="doc-icon ${cls}">${em}</div>
          <div class="card-info">
            <div class="card-name" title="${esc(fname)}">${esc(dname)}</div>
            ${loc ? `<div class="card-loc">${esc(loc)}</div>` : ''}
          </div>
          ${sim ? `<div class="card-score" style="color:${scoreColor(sim)}">${esc(sim)}</div>` : ''}
        </div>
        ${prev ? `<div class="card-preview">${esc(prev)}</div>` : ''}
        <div class="card-actions">
          <button class="btn-open" onclick="openDoc('${esc(path)}', ${pg}, ${idx})">
            ↗ Open
          </button>
          <a class="btn-view" href="${esc(viewHref)}" target="_blank" rel="noopener">
            👁 View
          </a>
          <span class="open-ok" id="ok-${idx}"></span>
        </div>
      </div>`;
  }

  // ── Open document via OS native app ──────────────────────────
  async function openDoc(path, page, idx) {
    const el = document.getElementById(`ok-${idx}`);
    try {
      const url = `/api/open-file?path=${encodeURIComponent(path)}&page=${page || 1}`;
      const res  = await fetch(url);
      const data = await res.json();
      if (el) {
        el.textContent = data.success ? '✓ Opened' : '✗ Not found locally';
        el.style.color  = data.success ? 'var(--green)' : 'var(--red)';
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2800);
      }
    } catch (e) {
      if (el) { el.textContent = '✗ Error'; el.style.color = 'var(--red)'; el.classList.add('show'); }
    }
  }

  // ── Render AI answer ──────────────────────────────────────────
  function renderAI(data) {
    const raw = (data.ai_response || '').trim();
    if (!raw) return `<div class="empty"><div class="ei">🤔</div><p>No response available.</p></div>`;

    // Paragraphs + basic **bold** support
    const html = raw
      .split(/\n\n+/)
      .map(p => `<p>${esc(p.trim()).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`)
      .join('');

    const model  = data.model || DEFAULT_MODEL;
    const ms     = data.backend_info?.search_time_ms ?? data.total_time_ms ?? null;
    const method = data.method || '';

    return `
      <div class="ai-text">${html}</div>
      <div class="ai-footer">
        <span class="ai-tag t-model">⚡ ${esc(model)}</span>
        ${ms  != null ? `<span class="ai-tag t-time">⏱ ${ms}ms</span>` : ''}
        ${method      ? `<span class="ai-tag t-method">${esc(method)}</span>` : ''}
      </div>`;
  }

  // ── Main search handler ───────────────────────────────────────
  async function doSearch(q) {
    if (!q.trim()) return;

    // Compact hero
    document.getElementById('hero').classList.add('compact');

    // Show panels
    const resultsEl  = document.getElementById('results');
    const statusBar  = document.getElementById('status-bar');
    const statusText = document.getElementById('status-text');
    const srcList    = document.getElementById('sources-list');
    const aiBox      = document.getElementById('ai-box');
    const srcCount   = document.getElementById('src-count');
    const aiMeta     = document.getElementById('ai-meta');
    const btn        = document.getElementById('search-btn');

    resultsEl.classList.add('show');
    statusBar.classList.add('show');
    statusText.textContent = 'Searching…';
    srcList.innerHTML  = skelCards();
    aiBox.innerHTML    = skelAI();
    srcCount.textContent = '…';
    aiMeta.textContent   = '…';
    btn.disabled = true;

    const t0 = Date.now();

    // Fire both requests in parallel
    const searchProm = fetch(
      `/api/research/search?q=${encodeURIComponent(q)}&method=${activeMethod}&k=5`
    ).then(r => r.json()).catch(e => ({ error: String(e), results: [], total_results: 0 }));

    const aiProm = fetch(
      `/api/research/ai?q=${encodeURIComponent(q)}&method=${activeMethod}&model=${encodeURIComponent(DEFAULT_MODEL)}`
    ).then(r => r.json()).catch(e => ({ error: String(e), ai_response: 'Error contacting AI service.' }));

    // Sources — render as soon as they arrive (fast)
    try {
      const sd = await searchProm;
      const items = sd.results || [];
      if (items.length === 0) {
        srcList.innerHTML = `<div class="empty"><div class="ei">🔍</div><p>No matching documents found.<br>Try a different question or method.</p></div>`;
      } else {
        srcList.innerHTML = items.map((r, i) => renderCard(r, i)).join('');
      }
      srcCount.textContent = items.length;
      const ms = sd.search_time_ms || (Date.now() - t0);
      statusText.textContent = `Found ${items.length} source${items.length !== 1 ? 's' : ''} in ${ms}ms · AI answering…`;
    } catch (e) {
      srcList.innerHTML = `<div class="empty"><div class="ei">⚠️</div><p>Search failed. Is the server running?</p></div>`;
    }

    // AI — render when ready (slower)
    try {
      const ad = await aiProm;
      aiBox.innerHTML = renderAI(ad);
      const total = Date.now() - t0;
      aiMeta.textContent   = `${total}ms`;
      statusText.textContent = `Done · ${total}ms total`;
    } catch (e) {
      aiBox.innerHTML = `<div class="empty"><div class="ei">⚠️</div><p>AI unavailable. Check that Ollama is running.</p></div>`;
    }

    btn.disabled = false;
  }

  // ── Form submit ───────────────────────────────────────────────
  document.getElementById('search-form').addEventListener('submit', e => {
    e.preventDefault();
    doSearch(document.getElementById('q').value.trim());
  });

  // ── Auto-focus ────────────────────────────────────────────────
  document.getElementById('q').focus();
</script>
</body>
</html>
